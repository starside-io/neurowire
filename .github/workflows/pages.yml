name: Publish site

# Build the docs page (site root) and the AI news example (/example), and deploy
# both to GitHub Pages in one deployment. Runs on every push to main, daily to keep
# the news example fresh, and on demand. Enable Pages once for the repo
# (Settings -> Pages -> Source: GitHub Actions) before the first run.

on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC (08:00 in UTC+8), refreshes the news example
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'examples/ai-news.mesh.json'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build the site
        # Docs at the root; the AI news example (last 24h only) under /example.
        run: |
          mkdir -p public/example
          pnpm exec tsx scripts/build-docs.ts public
          node packages/web/dist/cli.js \
            --mesh examples/ai-news.mesh.json \
            --since 24h \
            --out public/example/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
