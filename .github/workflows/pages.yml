name: Publish site

# Build the docs page (site root) and the example construct (/example), and deploy
# both to GitHub Pages in one deployment. The example is a construct: an overview
# page recapping every built-in mesh, each linking to its own feed page. Runs on
# every push to main, daily to keep the example fresh, and on demand. Enable Pages
# once for the repo (Settings -> Pages -> Source: GitHub Actions) before the first run.

on:
  schedule:
    # Every 6 hours (00:00/06:00/12:00/18:00 UTC). The example shows only today's
    # stories, so it rebuilds through the day to stay current as articles publish.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'examples/*.mesh.json'
      - 'examples/*.construct.json'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build the site
        # Docs at the root; the example construct (today only) under /example: an
        # overview of every built-in mesh, each linking to its own feed page. The
        # daily schedule keeps it to the current day's news. NEUROWIRE_MESHES lets
        # the construct reference the example meshes by name.
        env:
          NEUROWIRE_MESHES: examples
        run: |
          mkdir -p public/example
          pnpm exec tsx scripts/build-docs.ts public
          node packages/web/dist/cli.js \
            --construct examples/all.construct.json \
            --today \
            --out public/example
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
