name: Publish news page

# Regenerate the Neurowire news page on a schedule and publish it to GitHub Pages.
# Enable Pages for the repo (Settings -> Pages -> Source: GitHub Actions) before the
# first run. Trigger manually from the Actions tab via "Run workflow" any time.

on:
  schedule:
    - cron: '0 7 * * *' # daily at 07:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'examples/ai-news.mesh.json'
      - 'packages/**'
      - '.github/workflows/news.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Generate the page
        run: |
          mkdir -p public
          node packages/web/dist/cli.js \
            --mesh examples/ai-news.mesh.json \
            --out public/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
